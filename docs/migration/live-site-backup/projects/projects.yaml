# Side Projects
- title: "Digital Archeology"
  type: "side_project"
  description: "I have been part of a team of people involved with archiving notable sites and innovations from the early web and web 2.0 to a usable condition and restoring the machinery they would have been used on in order to preserve these artifacts for future generations. we ran the World Wide Web (Tim Berners-Lee’s initial website) on a contemporary NeXt computer, updated a 1989 Mac Color Classic with TCP/IP capabilities and ran Alan Emtage’s Archie search engine (the first ever) on a Mosaic browser, as well as unarchiving silicon valley firsts, like pizza net, Dr Fun, and the dancing baby, and their european contemporaries, like eBoy, BowieNet, and IKEA, all on the original machinery contemporary to their respective eras. We also sought to conduct interviews with some of the pioneers of the early internet and web."
  technologies: ["HTML 1, 2, 3", "Mosaic", "IE", "NetScape", "Early CSS", "Early JS"]
  images:
    - "./assets/projects/digital-arch-next-demo.png"

- title: "64 Bits"
  type: "side_project"
  description: "This exhibition took place in London's Olympic Park for three months in 2016 and showcased 64 examples from our digital archaeology collection as well as pieces of 8 bit and ASCII art, Susan Care’s UX designs for the early Apple Macintosh OS and a collection of BBC microcomputers to educate the younger generation in BASIC programming and highlight some of the challenges of early software engineers."
  technologies: ["JSON", "LAMP stack", "Mac OS Classic", "early 90s networking", "HTML 1, 2, 3", "Solaris", "Windows 3.1 for Workgroups"]
  images:
    - "./assets/projects/64_Bits_Exhibition.jpg"

