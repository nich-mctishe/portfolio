  A senior engineer with over 13 years professional experience working in both Vancouver, BC and London, UK for a variety of different brands, including Lululemon, HBO, Santander, Heineken, Ferrero and Dior.
  
  I am a principled engineer who is solutions driven and has a keen sense for problem solving. I understand the needs of an evolving business, and will gladly pivot with them. I admire well written code, I enjoy working with other engineers, and passing on my knowledge to them.
  
  Outside of work, I also like to push myself, and pursue a number of passions including Road/Gravel Cycling, Mountain Biking, Skiing, camping and Off-Roading. I like to travel the world. I love cooking and can often be found stoking a fire.

  At home, I like to build things, cook, and code.
